<!DOCTYPE html>
<html>
<head>
  <title>Sorry Di❤️</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 40px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }

    #startBtn {
      background: #ff4d6d;
      color: white;
    }

    #yes {
      background: green;
      color: white;
    }

    #no {
      background: red;
      color: white;
      position: absolute;
    }

    #main {
      display: none;
      margin-top: 40px;
    }

    img {
      width: 220px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 0 15px pink;
    }

    /* Floating hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      animation: floatUp 5s linear infinite;
      color: pink;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>Hlw di  💖</h1>
<button id="startBtn" onclick="start()">Click here</button>

<div id="main">
  <h2 id="text"></h2>

  <img src="yourphoto.jpg" alt="memory">

  <div id="buttons" style="display:none;">
    <h3>can you accept my request ? 😔</h3>
    <button id="yes" onclick="yesClick()">YES 💖</button>
    <button id="no" onmouseover="moveNo()">NO 😒</button>
  </div>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
let messages = [
  "Mujhse galti ho gayi 😔",
  "Maine apko hurt kiya...",
  "aap mere liye bahut important hai ❤️",
  "Please mujhe maaf kar diziye 🙏"
];

let i = 0;

function start() {
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("main").style.display = "block";

  document.getElementById("music").play();

  showText();
  startHearts();
}

function showText() {
  if (i < messages.length) {
    document.getElementById("text").innerHTML = messages[i];
    i++;
    setTimeout(showText, 2000);
  } else {
    document.getElementById("buttons").style.display = "block";
  }
}

function yesClick() {
  document.body.innerHTML =
    "<h1>😭❤️ Thank you di!<br Love You so muchh  💖</h1>";
}

function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  let btn = document.getElementById("no");
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* Floating hearts */
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
